<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jajabor AI CRM - Fast Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Minimal CSS for faster loading */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}
        .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .login-card h2{text-align:center;margin-bottom:30px}
        .input-group{margin-bottom:20px}
        .input-group input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px}
        .login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}
        .app-container{display:none}
        .sidebar{position:fixed;left:0;top:0;height:100%;width:260px;background:#fff;box-shadow:2px 0 10px rgba(0,0,0,.1);z-index:1000}
        .sidebar-header{padding:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-align:center}
        .menu-item{padding:12px 20px;display:flex;align-items:center;gap:12px;color:#666;cursor:pointer}
        .menu-item:hover{background:#f5f5f5;color:#667eea}
        .menu-item.active{background:linear-gradient(135deg,#667eea20 0%,#764ba220 100%);color:#667eea;border-right:3px solid #667eea}
        .main-content{margin-left:260px;padding:20px}
        .top-bar{background:#fff;padding:15px 20px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
        .logout-btn{padding:8px 15px;background:#ff4757;color:#fff;border:none;border-radius:5px;cursor:pointer}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:#fff;padding:20px;border-radius:15px;cursor:pointer}
        .stat-card .number{font-size:32px;font-weight:700}
        .lead-table-container{background:#fff;border-radius:15px;padding:20px;overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #e0e0e0}
        .priority-hot{color:#ff4757;font-weight:700}
        .priority-warm{color:#ffa502;font-weight:700}
        .priority-cold{color:#1e90ff;font-weight:700}
        .status-badge{padding:4px 8px;border-radius:5px;font-size:12px;font-weight:600;display:inline-block}
        .status-new{background:#e0e0e0;color:#666}
        .status-contacted{background:#3498db20;color:#3498db}
        .status-interested{background:#2ecc7120;color:#2ecc71}
        .status-not-interested{background:#e74c3c20;color:#e74c3c}
        .status-callback{background:#f39c1220;color:#f39c12}
        .btn-icon{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;margin:0 2px}
        .btn-edit{background:#3498db;color:#fff}
        .btn-delete{background:#e74c3c;color:#fff}
        .btn-call{background:#2ecc71;color:#fff}
        .btn-whatsapp{background:#25D366;color:#fff}
        .quick-actions{display:flex;gap:5px;margin-top:5px}
        .quick-btn{padding:3px 6px;border:none;border-radius:3px;cursor:pointer;font-size:10px}
        .quick-btn-interested{background:#2ecc71;color:#fff}
        .quick-btn-not-interested{background:#e74c3c;color:#fff}
        .quick-btn-callback{background:#f39c12;color:#fff}
        .filters-bar{background:#fff;padding:15px;border-radius:10px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
        .filters-bar select,.filters-bar input{padding:8px;border:1px solid #ddd;border-radius:5px}
        .pagination{display:flex;justify-content:center;gap:10px;margin-top:20px}
        .pagination button{padding:8px 15px;border:none;border-radius:5px;cursor:pointer;background:#667eea;color:#fff}
        .pagination button:disabled{background:#ccc;cursor:not-allowed}
        .notification{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;z-index:3000;animation:slideIn .3s ease}
        .notification-success{background:#2ecc71}
        .notification-error{background:#e74c3c}
        .loader{display:inline-block;width:20px;height:20px;border:2px solid #f3f3f3;border-top:2px solid #667eea;border-radius:50%;animation:spin .5s linear infinite}
        @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        @media (max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.active{transform:translateX(0)}.main-content{margin-left:0}}
        .lead-cards{display:none;gap:10px;flex-direction:column}
        .lead-card{background:#fff;border-radius:10px;padding:12px}
        @media (max-width:768px){.lead-table-container{display:none}.lead-cards{display:flex}}
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div style="text-align:center;font-size:48px">🚀</div>
            <h2>Jajabor AI CRM</h2>
            <form id="loginForm">
                <div class="input-group"><input type="text" id="username" placeholder="Username" required></div>
                <div class="input-group"><input type="password" id="password" placeholder="Password" required></div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <div id="appContainer" class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><h3>Jajabor AI</h3><small>Fast CRM</small></div>
            <div class="sidebar-menu">
                <div class="menu-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
                <div class="menu-item" data-page="leads"><i class="fas fa-users"></i><span>Leads</span></div>
                <div class="menu-item" data-page="addLead"><i class="fas fa-plus-circle"></i><span>Add Lead</span></div>
                <div class="menu-item" data-page="followups"><i class="fas fa-bell"></i><span>Follow-ups</span></div>
            </div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <button id="mobileMenuBtn" style="display:none;background:none;border:none;font-size:24px;cursor:pointer">☰</button>
                <div></div>
                <div><span id="currentUser"></span> <button class="logout-btn" id="logoutBtn">Logout</button></div>
            </div>
            <div id="pageContent"><div class="loader" style="margin:50px auto"></div></div>
        </div>
    </div>

    <div id="leadModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:2000">
        <div style="background:#fff;padding:25px;border-radius:15px;width:90%;max-width:500px">
            <h3 id="modalTitle">Lead</h3>
            <form id="leadForm">
                <input type="hidden" id="leadId">
                <div class="form-group"><input type="text" id="leadName" placeholder="Name" required style="width:100%;padding:10px;margin:5px 0"></div>
                <div class="form-group"><input type="tel" id="leadPhone" placeholder="Phone (10-digit)" maxlength="10" required style="width:100%;padding:10px;margin:5px 0"></div>
                <div class="form-group"><select id="leadSource" style="width:100%;padding:10px;margin:5px 0"><option>Manual</option><option>Facebook Ads</option><option>Google Ads</option><option>Website</option></select></div>
                <div class="form-group"><select id="leadStatus" style="width:100%;padding:10px;margin:5px 0"><option>New</option><option>Contacted</option><option>Interested</option><option>Not Interested</option><option>Callback Later</option><option>Closed</option></select></div>
                <div class="form-group"><select id="leadPriority" style="width:100%;padding:10px;margin:5px 0"><option>Hot</option><option>Warm</option><option>Cold</option></select></div>
                <div class="form-group"><select id="leadAssignedTo" style="width:100%;padding:10px;margin:5px 0"><option>Unassigned</option><option>agent1</option><option>agent2</option></select></div>
                <div class="form-group"><input type="date" id="leadNextFollowup" style="width:100%;padding:10px;margin:5px 0"></div>
                <div class="form-group"><textarea id="leadRemarks" rows="2" placeholder="Remarks" style="width:100%;padding:10px;margin:5px 0"></textarea></div>
                <button type="submit" class="login-btn">Save</button>
                <button type="button" onclick="closeModal()" style="margin-top:10px;width:100%;padding:10px;background:#95a5a6;color:#fff;border:none;border-radius:8px">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const API_URL = 'https://script.google.com/macros/s/AKfycbzNaDuJDL9OEwQdIBWifD7Iv7ECqiPNlBX0FJoIwG8s8nfBerK4RrLXu2Jg1AFUDvos/exec';
        const CACHE_KEY = 'jajabor_cache';
        const CACHE_DURATION = 5 * 60 * 1000; // 5 minutes cache
        
        // ========== STATE ==========
        let state = {
            user: null,
            leads: [],
            filters: { status: '', priority: '', search: '' },
            pagination: { page: 1, limit: 20, total: 0 },
            cache: { data: null, timestamp: 0 }
        };
        
        // ========== UTILITIES ==========
        function showNotification(msg, type = 'info') {
            const n = document.createElement('div');
            n.className = `notification notification-${type}`;
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2000);
        }
        
        function formatPhone(p) {
            let c = p?.toString().replace(/\D/g, '');
            if (c?.startsWith('91') && c.length === 12) c = c.substring(2);
            if (c?.startsWith('0')) c = c.substring(1);
            return c?.length === 10 ? c : null;
        }
        
        function openWhatsApp(p) { let f = formatPhone(p); if(f) window.open(`https://wa.me/91${f}`); else showNotification('Invalid number','error'); }
        function makeCall(p) { let f = formatPhone(p); if(f) window.location.href = `tel:+91${f}`; else showNotification('Invalid number','error'); }
        function escapeHtml(t) { if(!t) return ''; return t.replace(/[&<>]/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }
        
        // ========== OPTIMIZED API ==========
        let pendingRequests = new Map();
        
        async function callAPI(action, params = {}, method = 'GET') {
            const cacheKey = `${action}_${JSON.stringify(params)}`;
            
            // Check cache for GET requests
            if (method === 'GET' && state.cache.data && state.cache.timestamp > Date.now() - CACHE_DURATION) {
                if (state.cache.data.action === action) return state.cache.data.result;
            }
            
            // Prevent duplicate requests
            if (pendingRequests.has(cacheKey)) return pendingRequests.get(cacheKey);
            
            const promise = (async () => {
                try {
                    let url = `${API_URL}?action=${action}`;
                    if (method === 'GET') {
                        const q = new URLSearchParams(params);
                        if (q.toString()) url += '&' + q.toString();
                    }
                    
                    const options = { method, headers: { 'Content-Type': 'application/json' } };
                    if (method === 'POST') options.body = JSON.stringify(params);
                    
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    // Cache GET results
                    if (method === 'GET' && result.success) {
                        state.cache = { data: { action, result }, timestamp: Date.now() };
                    }
                    
                    return result;
                } catch (e) {
                    console.error(e);
                    showNotification('Network error', 'error');
                    return { success: false, message: e.message };
                } finally {
                    pendingRequests.delete(cacheKey);
                }
            })();
            
            pendingRequests.set(cacheKey, promise);
            return promise;
        }
        
        // ========== FAST DATA FETCH ==========
        async function fetchLeads(page = 1) {
            const params = { page, limit: state.pagination.limit, ...state.filters };
            if (state.user?.role === 'agent') params.assignedTo = state.user.username;
            
            const result = await callAPI('getLeads', params, 'GET');
            if (result.success) {
                state.leads = result.data?.leads || [];
                state.pagination.total = result.data?.total || 0;
                return state.leads;
            }
            return [];
        }
        
        async function fetchStats() {
            const params = state.user?.role === 'agent' ? { assignedTo: state.user.username } : {};
            const result = await callAPI('getStats', params, 'GET');
            return result.success ? result.data : { total: 0, byStatus: {}, byPriority: {}, conversionRate: 0 };
        }
        
        async function fetchFollowups() {
            const params = state.user?.role === 'agent' ? { assignedTo: state.user.username } : {};
            const result = await callAPI('getFollowups', params, 'GET');
            return result.success ? result.data : { overdue: [], today: [], upcoming: [] };
        }
        
        // ========== FAST RENDERING ==========
        let renderTimeout;
        function renderTable(leads) {
            if (!leads?.length) return '<p style="text-align:center;padding:40px">No leads found</p>';
            
            let html = '<table><thead><tr><th>Name</th><th>Phone</th><th>Status</th><th>Priority</th><th>Next</th><th>Actions</th></tr></thead><tbody>';
            
            leads.forEach(l => {
                const priorityClass = `priority-${(l.Priority || 'cold').toLowerCase()}`;
                const statusClass = `status-${(l.Status || 'new').toLowerCase().replace(' ', '-')}`;
                const followup = l['Next Follow-up Date'] ? new Date(l['Next Follow-up Date']).toLocaleDateString() : 'N/A';
                const isOverdue = l['Next Follow-up Date'] && new Date(l['Next Follow-up Date']) < new Date();
                
                html += `<tr>
                    <td><strong>${escapeHtml(l.Name || '')}</strong></td>
                    <td>${escapeHtml(l.Phone || '')}</td>
                    <td><span class="status-badge ${statusClass}">${l.Status || 'New'}</span></td>
                    <td class="${priorityClass}">${l.Priority || 'Cold'}</td>
                    <td ${isOverdue ? 'style="color:red;font-weight:bold"' : ''}>${followup}</td>
                    <td>
                        <button class="btn-icon btn-call" onclick="makeCall('${l.Phone}')"><i class="fas fa-phone"></i></button>
                        <button class="btn-icon btn-whatsapp" onclick="openWhatsApp('${l.Phone}')"><i class="fab fa-whatsapp"></i></button>
                        <button class="btn-icon btn-edit" onclick="editLead('${l['Lead ID']}')"><i class="fas fa-edit"></i></button>
                        ${state.user?.role === 'admin' ? `<button class="btn-icon btn-delete" onclick="deleteLeadHandler('${l['Lead ID']}')"><i class="fas fa-trash"></i></button>` : ''}
                    </td>
                </tr>
                <tr><td colspan="6"><div class="quick-actions">
                    <button class="quick-btn quick-btn-interested" onclick="quickUpdate('${l['Lead ID']}','Interested')">👍 Interested</button>
                    <button class="quick-btn quick-btn-not-interested" onclick="quickUpdate('${l['Lead ID']}','Not Interested')">👎 Not Interested</button>
                    <button class="quick-btn quick-btn-callback" onclick="quickUpdate('${l['Lead ID']}','Callback Later')">⏰ Callback</button>
                </div></td></tr>`;
            });
            
            html += '</tbody></table>';
            return html;
        }
        
        function renderCards(leads) {
            if (!leads?.length) return '';
            let html = '<div class="lead-cards">';
            leads.forEach(l => {
                html += `<div class="lead-card">
                    <div><strong>${escapeHtml(l.Name || '')}</strong> <span class="priority-${(l.Priority || 'cold').toLowerCase()}">${l.Priority || 'Cold'}</span></div>
                    <div>📞 ${escapeHtml(l.Phone || '')}</div>
                    <div><span class="status-badge status-${(l.Status || 'new').toLowerCase().replace(' ', '-')}">${l.Status || 'New'}</span></div>
                    <div>
                        <button class="btn-icon btn-call" onclick="makeCall('${l.Phone}')"><i class="fas fa-phone"></i></button>
                        <button class="btn-icon btn-whatsapp" onclick="openWhatsApp('${l.Phone}')"><i class="fab fa-whatsapp"></i></button>
                        <button class="btn-icon btn-edit" onclick="editLead('${l['Lead ID']}')"><i class="fas fa-edit"></i></button>
                    </div>
                    <div class="quick-actions">
                        <button class="quick-btn quick-btn-interested" onclick="quickUpdate('${l['Lead ID']}','Interested')">Interested</button>
                        <button class="quick-btn quick-btn-not-interested" onclick="quickUpdate('${l['Lead ID']}','Not Interested')">Not Interested</button>
                        <button class="quick-btn quick-btn-callback" onclick="quickUpdate('${l['Lead ID']}','Callback Later')">Callback</button>
                    </div>
                </div>`;
            });
            html += '</div>';
            return html;
        }
        
        // ========== PAGE LOADERS ==========
        let currentPage = 'dashboard';
        
        async function loadDashboard() {
            if (currentPage === 'dashboard') return;
            currentPage = 'dashboard';
            document.getElementById('pageContent').innerHTML = '<div class="loader" style="margin:50px auto"></div>';
            
            const [stats, followups] = await Promise.all([fetchStats(), fetchFollowups()]);
            await fetchLeads(1);
            
            const html = `
                <h2>Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-card" onclick="loadLeadsPage()"><h4>Total Leads</h4><div class="number">${stats.total || 0}</div></div>
                    <div class="stat-card" onclick="loadLeadsPage({status:'Interested'})"><h4>Conversion</h4><div class="number">${stats.conversionRate || 0}%</div></div>
                    <div class="stat-card" onclick="loadFollowupsPage('today')"><h4>Today's Follow-ups</h4><div class="number">${followups.today?.length || 0}</div></div>
                    <div class="stat-card" onclick="loadLeadsPage({priority:'Hot'})"><h4>Hot Leads</h4><div class="number">${stats.byPriority?.Hot || 0}</div></div>
                </div>
                <div class="lead-table-container"><h3>Recent Leads</h3>${renderTable(state.leads.slice(0, 10))}</div>
                ${renderCards(state.leads.slice(0, 10))}
            `;
            document.getElementById('pageContent').innerHTML = html;
        }
        
        async function loadLeadsPage(filters = {}) {
            if (currentPage === 'leads' && !Object.keys(filters).length) return;
            currentPage = 'leads';
            document.getElementById('pageContent').innerHTML = '<div class="loader" style="margin:50px auto"></div>';
            
            Object.assign(state.filters, filters);
            await fetchLeads(1);
            
            const html = `
                <h2>All Leads</h2>
                <div class="filters-bar">
                    <select id="statusFilter" onchange="applyFilters()"><option value="">All Status</option><option>New</option><option>Contacted</option><option>Interested</option><option>Not Interested</option><option>Callback Later</option><option>Closed</option></select>
                    <select id="priorityFilter" onchange="applyFilters()"><option value="">All Priority</option><option>Hot</option><option>Warm</option><option>Cold</option></select>
                    <input type="text" id="searchFilter" placeholder="Search..." onkeyup="debounceFilters()">
                    <button onclick="applyFilters()" class="login-btn" style="width:auto;padding:8px 15px">Apply</button>
                </div>
                <div class="lead-table-container">${renderTable(state.leads)}${renderPagination()}</div>
                ${renderCards(state.leads)}
            `;
            document.getElementById('pageContent').innerHTML = html;
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(state.pagination.total / state.pagination.limit);
            if (totalPages <= 1) return '';
            return `<div class="pagination">
                <button onclick="changePage(${state.pagination.page - 1})" ${state.pagination.page === 1 ? 'disabled' : ''}>Previous</button>
                <span>Page ${state.pagination.page} of ${totalPages}</span>
                <button onclick="changePage(${state.pagination.page + 1})" ${state.pagination.page === totalPages ? 'disabled' : ''}>Next</button>
            </div>`;
        }
        
        let filterTimer;
        window.debounceFilters = () => { clearTimeout(filterTimer); filterTimer = setTimeout(() => applyFilters(), 500); };
        
        window.applyFilters = async () => {
            state.filters.status = document.getElementById('statusFilter')?.value || '';
            state.filters.priority = document.getElementById('priorityFilter')?.value || '';
            state.filters.search = document.getElementById('searchFilter')?.value || '';
            await fetchLeads(1);
            const container = document.querySelector('.lead-table-container');
            if (container) container.innerHTML = renderTable(state.leads) + renderPagination();
        };
        
        window.changePage = async (page) => {
            if (page < 1 || page > Math.ceil(state.pagination.total / state.pagination.limit)) return;
            state.pagination.page = page;
            await fetchLeads(page);
            const container = document.querySelector('.lead-table-container');
            if (container) container.innerHTML = renderTable(state.leads) + renderPagination();
        };
        
        async function loadFollowupsPage(category = 'all') {
            currentPage = 'followups';
            document.getElementById('pageContent').innerHTML = '<div class="loader" style="margin:50px auto"></div>';
            
            const data = await fetchFollowups();
            let leads = category === 'overdue' ? data.overdue : category === 'today' ? data.today : category === 'upcoming' ? data.upcoming : [...(data.overdue || []), ...(data.today || []), ...(data.upcoming || [])];
            
            const html = `
                <h2>Follow-ups</h2>
                <div class="filters-bar">
                    <button class="login-btn" style="width:auto;padding:8px 15px" onclick="loadFollowupsPage('overdue')">⚠️ Overdue (${data.overdue?.length || 0})</button>
                    <button class="login-btn" style="width:auto;padding:8px 15px" onclick="loadFollowupsPage('today')">📅 Today (${data.today?.length || 0})</button>
                    <button class="login-btn" style="width:auto;padding:8px 15px" onclick="loadFollowupsPage('upcoming')">📆 Upcoming (${data.upcoming?.length || 0})</button>
                </div>
                <div class="lead-table-container"><h3>${category === 'overdue' ? 'Overdue' : category === 'today' ? "Today's" : 'Upcoming'} Follow-ups</h3>${renderTable(leads)}</div>
                ${renderCards(leads)}
            `;
            document.getElementById('pageContent').innerHTML = html;
        }
        
        async function loadAddLeadPage() {
            currentPage = 'addLead';
            document.getElementById('pageContent').innerHTML = `
                <h2>Add Lead</h2>
                <div style="background:#fff;padding:25px;border-radius:15px;max-width:500px;margin:0 auto">
                    <form id="newLeadForm">
                        <input type="text" id="newName" placeholder="Name" required style="width:100%;padding:10px;margin:5px 0">
                        <input type="tel" id="newPhone" placeholder="Phone (10-digit)" maxlength="10" required style="width:100%;padding:10px;margin:5px 0">
                        <select id="newSource" style="width:100%;padding:10px;margin:5px 0"><option>Manual</option><option>Facebook Ads</option><option>Google Ads</option><option>Website</option></select>
                        <select id="newPriority" style="width:100%;padding:10px;margin:5px 0"><option>Hot</option><option>Warm</option><option>Cold</option></select>
                        <select id="newAssigned" style="width:100%;padding:10px;margin:5px 0"><option>Unassigned</option><option>agent1</option><option>agent2</option></select>
                        <input type="date" id="newFollowup" style="width:100%;padding:10px;margin:5px 0">
                        <textarea id="newRemarks" rows="2" placeholder="Remarks" style="width:100%;padding:10px;margin:5px 0"></textarea>
                        <button type="submit" class="login-btn">Add Lead</button>
                    </form>
                </div>
            `;
            
            document.getElementById('newLeadForm').onsubmit = async (e) => {
                e.preventDefault();
                const phone = document.getElementById('newPhone').value;
                const formatted = formatPhone(phone);
                if (!formatted) { showNotification('Invalid phone number', 'error'); return; }
                
                const lead = {
                    name: document.getElementById('newName').value,
                    phone: formatted,
                    source: document.getElementById('newSource').value,
                    priority: document.getElementById('newPriority').value,
                    assignedTo: document.getElementById('newAssigned').value,
                    nextFollowupDate: document.getElementById('newFollowup').value,
                    remarks: document.getElementById('newRemarks').value,
                    status: 'New'
                };
                
                const result = await callAPI('addLead', { lead, createdBy: state.user.username }, 'POST');
                if (result.success) {
                    showNotification('Lead added!', 'success');
                    if (lead.priority === 'Hot') setTimeout(() => openWhatsApp(formatted), 500);
                    loadLeadsPage();
                } else showNotification(result.message, 'error');
            };
        }
        
        // ========== ACTIONS ==========
        window.editLead = async (id) => {
            const lead = state.leads.find(l => l['Lead ID'] === id);
            if (!lead) return;
            document.getElementById('leadId').value = id;
            document.getElementById('leadName').value = lead.Name || '';
            document.getElementById('leadPhone').value = lead.Phone || '';
            document.getElementById('leadSource').value = lead.Source || 'Manual';
            document.getElementById('leadStatus').value = lead.Status || 'New';
            document.getElementById('leadPriority').value = lead.Priority || 'Warm';
            document.getElementById('leadAssignedTo').value = lead['Assigned To'] || 'Unassigned';
            document.getElementById('leadNextFollowup').value = lead['Next Follow-up Date']?.split('T')[0] || '';
            document.getElementById('leadRemarks').value = lead.Remarks || '';
            document.getElementById('leadModal').style.display = 'flex';
        };
        
        window.quickUpdate = async (id, status) => {
            const updates = { status, lastCallDate: new Date().toISOString() };
            if (status === 'Callback Later') updates.nextFollowupDate = new Date(Date.now() + 2*86400000).toISOString().split('T')[0];
            const result = await callAPI('quickUpdate', { leadId: id, updates }, 'POST');
            if (result.success) {
                showNotification('Updated!', 'success');
                if (currentPage === 'leads') await loadLeadsPage();
                else if (currentPage === 'dashboard') await loadDashboard();
                else if (currentPage === 'followups') await loadFollowupsPage();
            }
        };
        
        window.deleteLeadHandler = async (id) => {
            if (!confirm('Delete this lead?')) return;
            const result = await callAPI('deleteLead', { leadId: id }, 'POST');
            if (result.success) {
                showNotification('Deleted!', 'success');
                if (currentPage === 'leads') await loadLeadsPage();
                else await loadDashboard();
            }
        };
        
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('leadId').value;
            const phone = document.getElementById('leadPhone').value;
            const formatted = formatPhone(phone);
            if (!formatted) { showNotification('Invalid phone', 'error'); return; }
            
            const lead = {
                leadId: id,
                name: document.getElementById('leadName').value,
                phone: formatted,
                source: document.getElementById('leadSource').value,
                status: document.getElementById('leadStatus').value,
                priority: document.getElementById('leadPriority').value,
                assignedTo: document.getElementById('leadAssignedTo').value,
                nextFollowupDate: document.getElementById('leadNextFollowup').value,
                remarks: document.getElementById('leadRemarks').value,
                lastCallDate: new Date().toISOString()
            };
            
            const result = await callAPI('updateLead', { lead }, 'POST');
            if (result.success) {
                closeModal();
                showNotification('Updated!', 'success');
                if (currentPage === 'leads') await loadLeadsPage();
                else await loadDashboard();
            }
        };
        
        function closeModal() { document.getElementById('leadModal').style.display = 'none'; }
        
        // ========== AUTH ==========
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.login-btn');
            btn.textContent = '...'; btn.disabled = true;
            const result = await callAPI('authenticate', { username: document.getElementById('username').value, password: document.getElementById('password').value }, 'GET');
            if (result.success) {
                state.user = result.data;
                localStorage.setItem('user', JSON.stringify(state.user));
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('currentUser').textContent = `👤 ${state.user.username}`;
                if (window.innerWidth <= 768) document.getElementById('mobileMenuBtn').style.display = 'block';
                loadDashboard();
            } else showNotification(result.message, 'error');
            btn.textContent = 'Login'; btn.disabled = false;
        };
        
        document.getElementById('logoutBtn').onclick = () => {
                    localStorage.removeItem('user');
            state.user = null;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            showNotification('Logged out', 'info');
        };
        
        // ========== MOBILE MENU ==========
        document.getElementById('mobileMenuBtn').onclick = () => {
            document.getElementById('sidebar').classList.toggle('active');
        };
        
        // ========== MENU NAVIGATION ==========
        document.querySelectorAll('.menu-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                const page = item.dataset.page;
                if (page === 'dashboard') loadDashboard();
                else if (page === 'leads') loadLeadsPage();
                else if (page === 'addLead') loadAddLeadPage();
                else if (page === 'followups') loadFollowupsPage();
                if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('active');
            };
        });
        
        // ========== CHECK SAVED SESSION ==========
        const saved = localStorage.getItem('user');
        if (saved) {
            state.user = JSON.parse(saved);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('currentUser').textContent = `👤 ${state.user.username}`;
            if (window.innerWidth <= 768) document.getElementById('mobileMenuBtn').style.display = 'block';
            loadDashboard();
        }
    </script>
</body>
</html>
