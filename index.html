<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="color-scheme" content="light">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'">
    <title>Jajabor AI CRM</title>
    <style>
        :root {
            --bg: #f7faf9;
            --panel: #ffffff;
            --ink: #101828;
            --muted: #536579;
            --line: #d3dce5;
            --brand: #047857;
            --brand-dark: #065f46;
            --brand-soft: #d1fae5;
            --accent: #1d4ed8;
            --danger: #b91c1c;
            --warn: #b45309;
            --ok: #047857;
            --shadow: 0 18px 45px rgba(16, 24, 40, .12);
            --radius: 8px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            touch-action: manipulation;
        }

        .icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex: 0 0 auto;
        }

        .screen {
            min-height: 100vh;
        }

        .login-screen {
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 20% 10%, rgba(16, 185, 129, .2), transparent 30%),
                linear-gradient(135deg, #06281f 0%, #064e3b 58%, #1e3a8a 100%);
        }

        .login-card {
            width: min(100%, 420px);
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, .75);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: white;
            background: linear-gradient(135deg, var(--brand), var(--accent));
            margin-bottom: 18px;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        .login-card h1 {
            font-size: 26px;
            line-height: 1.15;
            margin-bottom: 8px;
        }

        .subtle {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .form {
            display: grid;
            gap: 14px;
            margin-top: 22px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label {
            color: #344054;
            font-size: 13px;
            font-weight: 700;
        }

        .input,
        .select,
        .textarea {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            padding: 10px 12px;
            outline: 0;
        }

        .textarea {
            min-height: 92px;
            resize: vertical;
        }

        .input:focus,
        .select:focus,
        .textarea:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
        }

        .btn {
            min-height: 44px;
            border: 1px solid transparent;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            font-weight: 800;
            cursor: pointer;
            background: #eef4f1;
            color: var(--ink);
            transition: transform .12s ease, background .12s ease, border-color .12s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: .65;
            transform: none;
        }

        .btn-primary {
            color: #fff;
            background: var(--brand);
            border-color: var(--brand);
        }

        .btn-primary:hover {
            background: var(--brand-dark);
            border-color: var(--brand-dark);
        }

        .btn-danger {
            color: #fff;
            background: var(--danger);
        }

        .btn-ghost {
            background: #ffffff;
            border-color: #cbd5e1;
            color: #1f2937;
        }

        .btn-ghost:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        .app-shell {
            display: none;
            min-height: 100vh;
            grid-template-columns: 264px minmax(0, 1fr);
        }

        .app-shell.is-ready {
            display: grid;
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            background: linear-gradient(180deg, #063126 0%, #0f172a 100%);
            color: #f8fafc;
            padding: 22px 14px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, .12);
        }

        .sidebar-brand strong {
            display: block;
            font-size: 17px;
        }

        .sidebar-brand span {
            color: #cbd5e1;
            font-size: 12px;
        }

        .nav-list {
            display: grid;
            gap: 6px;
        }

        .nav-btn {
            width: 100%;
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #dbeafe;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 700;
            text-align: left;
        }

        .nav-btn:hover,
        .nav-btn.is-active {
            background: rgba(255, 255, 255, .12);
            color: #fff;
        }

        .sidebar-footer {
            margin-top: auto;
            display: grid;
            gap: 8px;
        }

        .sidebar-footer .btn-ghost {
            background: rgba(255, 255, 255, .1);
            border-color: rgba(255, 255, 255, .28);
            color: #ffffff;
        }

        .sidebar-footer .btn-ghost:hover {
            background: rgba(255, 255, 255, .18);
            border-color: rgba(255, 255, 255, .45);
        }

        .content {
            min-width: 0;
            padding: 22px 24px 40px;
        }

        .topbar {
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .page-title {
            display: grid;
            gap: 3px;
        }

        .page-title h2 {
            font-size: 24px;
            line-height: 1.1;
        }

        .user-chip {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            padding: 7px 10px;
            color: #344054;
            font-size: 13px;
            font-weight: 800;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .mobile-logout-btn {
            display: none;
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 8px;
            color: #fff;
            background: var(--danger);
            place-items: center;
            cursor: pointer;
        }

        .grid {
            display: grid;
            gap: 14px;
        }

        .stats-grid {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
        }

        .stat-card {
            padding: 16px;
            display: grid;
            gap: 8px;
            min-height: 112px;
        }

        .stat-card span {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .stat-card strong {
            font-size: 30px;
            line-height: 1;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1;
        }

        .filter-row .input,
        .filter-row .select {
            max-width: 230px;
        }

        .lead-list {
            display: grid;
            gap: 10px;
        }

        .lead-card {
            padding: 14px;
            display: grid;
            gap: 12px;
        }

        .lead-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .lead-name {
            font-size: 16px;
            font-weight: 850;
        }

        .lead-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 12px;
            font-weight: 850;
            background: #eef2f7;
            color: #344054;
        }

        .badge-hot,
        .badge-overdue {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-warm {
            background: #ffedd5;
            color: #9a3412;
        }

        .badge-cold {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-ok {
            background: #dcfce7;
            color: #166534;
        }

        .lead-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .icon-btn {
            min-width: 42px;
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 850;
            cursor: pointer;
        }

        .icon-btn:hover {
            border-color: #aab4c4;
        }

        .icon-btn span:not(.icon-label) {
            display: inline-flex;
        }

        .icon-label {
            line-height: 1;
        }

        .lead-actions .icon-btn {
            flex: 1 1 112px;
            border: 0;
            color: #fff;
        }

        .lead-actions .action-call {
            background: #047857;
        }

        .lead-actions .action-whatsapp {
            background: #15803d;
        }

        .lead-actions .action-edit {
            background: #1d4ed8;
        }

        .lead-actions .action-delete {
            background: #b91c1c;
        }

        .lead-actions .icon-btn:hover {
            filter: brightness(.94);
        }

        .empty-state,
        .loading-state {
            min-height: 160px;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--muted);
            padding: 24px;
        }

        .form-card {
            max-width: 740px;
            padding: 18px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .form-grid .field-wide {
            grid-column: 1 / -1;
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            place-items: end center;
            background: rgba(15, 23, 42, .46);
            z-index: 50;
            padding: 18px;
        }

        .modal.is-open {
            display: grid;
        }

        .modal-panel {
            width: min(100%, 620px);
            max-height: min(92vh, 820px);
            overflow: auto;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .toast-stack {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 80;
            display: grid;
            gap: 8px;
        }

        .toast {
            min-width: min(320px, calc(100vw - 32px));
            border-radius: 8px;
            padding: 12px 14px;
            color: #fff;
            box-shadow: var(--shadow);
            font-weight: 800;
            background: #334155;
        }

        .toast.success {
            background: var(--ok);
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.warning {
            background: var(--warn);
        }

        .bottom-tabs {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 980px) {
            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            body {
                background: #f7f9fc;
            }

            .login-screen {
                align-items: stretch;
                padding: 18px;
            }

            .login-card {
                align-self: center;
                padding: 22px;
            }

            .app-shell.is-ready {
                display: block;
            }

            .sidebar {
                display: none;
            }

            .content {
                padding: calc(14px + env(safe-area-inset-top, 0px)) 12px calc(86px + var(--safe-bottom));
            }

            .topbar {
                position: sticky;
                top: 0;
                z-index: 20;
                min-height: 58px;
                margin: -14px -12px 14px;
                padding: 12px;
                background: rgba(247, 250, 249, .96);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid rgba(217, 222, 231, .7);
            }

            .page-title h2 {
                font-size: 22px;
            }

            .user-chip {
                max-width: 46vw;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
            }

            .mobile-logout-btn {
                display: grid;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }

            .stat-card {
                min-height: 102px;
                padding: 14px;
            }

            .stat-card strong {
                font-size: 26px;
            }

            .toolbar {
                align-items: stretch;
            }

            .filter-row {
                width: 100%;
            }

            .filter-row .input,
            .filter-row .select,
            .toolbar .btn {
                max-width: none;
                width: 100%;
            }

            .lead-head {
                display: grid;
                gap: 8px;
            }

            .lead-actions {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
            }

            .icon-btn {
                width: 100%;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                align-items: end;
                padding: 0;
            }

            .modal-panel {
                max-height: 88vh;
                border-radius: 8px 8px 0 0;
                padding-bottom: calc(18px + var(--safe-bottom));
            }

            .toast-stack {
                top: auto;
                right: 12px;
                bottom: calc(86px + var(--safe-bottom));
                left: 12px;
            }

            .toast {
                min-width: 0;
                width: 100%;
            }

            .bottom-tabs {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 40;
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                padding: 8px 8px calc(8px + var(--safe-bottom));
                background: rgba(255, 255, 255, .98);
                border-top: 1px solid var(--line);
                backdrop-filter: blur(14px);
            }

            .tab-btn {
                min-height: 52px;
                border: 0;
                border-radius: 8px;
                background: transparent;
                color: #344054;
                display: grid;
                place-items: center;
                gap: 2px;
                font-size: 11px;
                font-weight: 800;
                cursor: pointer;
            }

            .tab-btn .icon {
                width: 19px;
                height: 19px;
            }

            .tab-btn.is-active {
                color: #064e3b;
                background: var(--brand-soft);
            }
        }
    </style>
</head>
<body>
    <template id="icons">
        <svg data-icon="home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"></path><path d="M5 10v10h14V10"></path><path d="M9 20v-6h6v6"></path></svg>
        <svg data-icon="users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        <svg data-icon="user-check" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="m16 11 2 2 4-4"></path></svg>
        <svg data-icon="plus" viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
        <svg data-icon="bell" viewBox="0 0 24 24"><path d="M10 21h4"></path><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path></svg>
        <svg data-icon="phone" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.2 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.92.33 1.81.63 2.66a2 2 0 0 1-.45 2.11L8 9.79a16 16 0 0 0 6.2 6.2l1.3-1.29a2 2 0 0 1 2.11-.45c.85.3 1.74.51 2.66.63A2 2 0 0 1 22 16.92z"></path></svg>
        <svg data-icon="message" viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path></svg>
        <svg data-icon="edit" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
        <svg data-icon="trash" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
        <svg data-icon="log-out" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg>
        <svg data-icon="refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path><path d="M3 21v-5h5"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M21 3v5h-5"></path></svg>
        <svg data-icon="shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
        <svg data-icon="x" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
    </template>

    <script type="application/json" id="app-config">
        { "apiUrl": "https://script.google.com/macros/s/AKfycbyfdGhAQQaWA9YlHSw6Rpw9yczF9LNWyOh4QOWk8j-MwMnnAGYDs7vMLkqku0d1jV2V/exec" }
    </script>

    <section id="loginScreen" class="screen login-screen">
        <div class="login-card">
            <div class="brand-mark" data-icon-slot="shield"></div>
            <h1>Jajabor AI CRM</h1>
            <p class="subtle">Secure telesales workspace for lead calling, follow-ups, and team ownership.</p>
            <form class="form" id="loginForm" autocomplete="on">
                <div class="field">
                    <label for="username">Username</label>
                    <input class="input" id="username" name="username" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input class="input" id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn btn-primary" id="loginButton" type="submit">Login</button>
                <p id="configWarning" class="subtle hidden"></p>
            </form>
        </div>
    </section>

    <section id="appShell" class="app-shell" aria-live="polite">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-mark" data-icon-slot="shield"></div>
                <div>
                    <strong>Jajabor AI</strong>
                    <span>Telesales CRM</span>
                </div>
            </div>
            <nav class="nav-list" data-nav></nav>
            <div class="sidebar-footer">
                <button class="btn btn-ghost" id="refreshBtn" type="button"><span data-icon-slot="refresh"></span>Refresh</button>
                <button class="btn btn-ghost" id="logoutBtn" type="button"><span data-icon-slot="log-out"></span>Logout</button>
            </div>
        </aside>

        <main class="content">
            <header class="topbar">
                <div class="page-title">
                    <h2 id="pageTitle">Dashboard</h2>
                    <p class="subtle" id="pageSubtitle">Live calling overview</p>
                </div>
                <div class="top-actions">
                    <div class="user-chip" id="userChip"></div>
                    <button class="mobile-logout-btn" id="mobileLogoutBtn" type="button" aria-label="Logout" title="Logout">
                        <span data-icon-slot="log-out"></span>
                    </button>
                </div>
            </header>
            <div id="pageContent" class="grid"></div>
        </main>

        <nav class="bottom-tabs" data-tabs></nav>
    </section>

    <div id="leadModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-panel">
            <div class="modal-head">
                <h3 id="modalTitle">Edit Lead</h3>
                <button class="icon-btn" id="closeModalBtn" type="button" aria-label="Close"><span data-icon-slot="x"></span></button>
            </div>
            <form class="form-grid" id="leadForm">
                <input type="hidden" id="leadId">
                <div class="field">
                    <label for="leadName">Name</label>
                    <input class="input" id="leadName" required maxlength="80">
                </div>
                <div class="field">
                    <label for="leadPhone">Phone</label>
                    <input class="input" id="leadPhone" type="tel" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" required>
                </div>
                <div class="field">
                    <label for="leadSource">Source</label>
                    <select class="select" id="leadSource"></select>
                </div>
                <div class="field">
                    <label for="leadStatus">Status</label>
                    <select class="select" id="leadStatus"></select>
                </div>
                <div class="field">
                    <label for="leadPriority">Priority</label>
                    <select class="select" id="leadPriority"></select>
                </div>
                <div class="field">
                    <label for="leadAssignedTo">Assigned To</label>
                    <select class="select" id="leadAssignedTo"></select>
                </div>
                <div class="field field-wide">
                    <label for="leadNextFollowup">Next Follow-up</label>
                    <input class="input" id="leadNextFollowup" type="date">
                </div>
                <div class="field field-wide">
                    <label for="leadRemarks">Remarks</label>
                    <textarea class="textarea" id="leadRemarks" maxlength="500"></textarea>
                </div>
                <button class="btn btn-primary field-wide" type="submit">Save Lead</button>
            </form>
        </div>
    </div>

    <div id="toastStack" class="toast-stack"></div>

    <script>
        const STORAGE_KEY = 'jajaborCrmSession';
        const FALLBACK_OPTIONS = {
            statuses: ['New', 'Contacted', 'Interested', 'Not Interested', 'Callback Later', 'Closed'],
            priorities: ['Hot', 'Warm', 'Cold'],
            sources: ['Manual', 'Facebook Ads', 'Google Ads', 'Website'],
            users: ['Unassigned']
        };
        const NAV_ITEMS = [
            { page: 'dashboard', label: 'Home', title: 'Dashboard', subtitle: 'Live calling overview', icon: 'home' },
            { page: 'leads', label: 'Leads', title: 'All Leads', subtitle: 'Search, call, and update leads', icon: 'users' },
            { page: 'myLeads', label: 'Mine', title: 'My Leads', subtitle: 'Assigned work queue', icon: 'user-check' },
            { page: 'addLead', label: 'Add', title: 'Add Lead', subtitle: 'Capture a new prospect', icon: 'plus' },
            { page: 'followups', label: 'Follow-ups', title: 'Follow-ups', subtitle: 'Due and overdue callbacks', icon: 'bell' }
        ];

        const state = {
            apiUrl: '',
            currentUser: null,
            token: '',
            options: { ...FALLBACK_OPTIONS },
            leads: [],
            stats: null,
            followups: [],
            page: 'dashboard',
            busy: false
        };

        const qs = (selector, root = document) => root.querySelector(selector);
        const qsa = (selector, root = document) => Array.from(root.querySelectorAll(selector));

        function icon(name) {
            const source = qs(`#icons svg[data-icon="${name}"]`);
            if (!source) return document.createElement('span');
            const svg = source.cloneNode(true);
            svg.classList.add('icon');
            svg.removeAttribute('data-icon');
            svg.setAttribute('aria-hidden', 'true');
            return svg;
        }

        function mountIcons(root = document) {
            qsa('[data-icon-slot]', root).forEach((slot) => {
                const name = slot.dataset.iconSlot;
                slot.replaceChildren(icon(name));
            });
        }

        function readConfig() {
            let fileConfig = {};
            try {
                fileConfig = JSON.parse(qs('#app-config').textContent);
            } catch (error) {
                fileConfig = {};
            }
            const configuredUrl = window.JAJABOR_API_URL || fileConfig.apiUrl || localStorage.getItem('jajaborApiUrl') || '';
            state.apiUrl = String(configuredUrl).trim();
            const warning = qs('#configWarning');
            if (!state.apiUrl) {
                warning.textContent = 'API URL is not configured.';
                warning.classList.remove('hidden');
            }
        }

        function saveSession(payload) {
            const session = {
                token: payload.token,
                user: payload.user,
                expiresAt: payload.expiresAt
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
            state.token = session.token;
            state.currentUser = session.user;
        }

        function loadSession() {
            try {
                const session = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
                if (!session || !session.token || !session.user) return false;
                if (session.expiresAt && Date.now() > Number(session.expiresAt)) {
                    clearSession();
                    return false;
                }
                state.token = session.token;
                state.currentUser = session.user;
                return true;
            } catch (error) {
                clearSession();
                return false;
            }
        }

        function clearSession() {
            localStorage.removeItem(STORAGE_KEY);
            state.token = '';
            state.currentUser = null;
        }

        async function api(action, payload = {}) {
            if (!state.apiUrl) {
                throw new Error('API URL is not configured.');
            }
            const body = {
                action,
                token: state.token,
                ...payload
            };
            const response = await fetch(state.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(body),
                redirect: 'follow',
                cache: 'no-store'
            });
            const data = await response.json();
            if (!data.success) {
                if (data.code === 'UNAUTHORIZED') logout(false);
                throw new Error(data.message || 'Request failed');
            }
            return data.data;
        }

        async function login(username, password) {
            const response = await fetch(state.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'authenticate', username, password }),
                redirect: 'follow',
                cache: 'no-store'
            });
            const data = await response.json();
            if (!data.success) throw new Error(data.message || 'Invalid credentials');
            saveSession(data.data);
        }

        async function bootstrapData() {
            const [options, stats, leads, followups] = await Promise.all([
                api('getOptions').catch(() => FALLBACK_OPTIONS),
                api('getStats'),
                api('getLeads', { filters: {} }),
                api('getTodaysFollowups')
            ]);
            state.options = normalizeOptions(options);
            state.stats = stats;
            state.leads = Array.isArray(leads) ? leads : [];
            state.followups = Array.isArray(followups) ? followups : [];
            fillLeadFormOptions();
        }

        function normalizeOptions(options) {
            return {
                statuses: arrayOrFallback(options.statuses, FALLBACK_OPTIONS.statuses),
                priorities: arrayOrFallback(options.priorities, FALLBACK_OPTIONS.priorities),
                sources: arrayOrFallback(options.sources, FALLBACK_OPTIONS.sources),
                users: arrayOrFallback(options.users, FALLBACK_OPTIONS.users)
            };
        }

        function arrayOrFallback(value, fallback) {
            return Array.isArray(value) && value.length ? value : fallback;
        }

        function formatPhoneNumber(phone) {
            const cleaned = String(phone || '').replace(/\D/g, '').replace(/^91(?=\d{10}$)/, '').replace(/^0/, '');
            return cleaned.length === 10 ? cleaned : '';
        }

        function formatDate(value) {
            if (!value) return 'N/A';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'N/A';
            return date.toLocaleDateString(undefined, { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function isOverdue(value) {
            if (!value) return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const date = new Date(value);
            date.setHours(0, 0, 0, 0);
            return date < today;
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            qs('#toastStack').append(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        function setBusy(isBusy) {
            state.busy = isBusy;
            qsa('button').forEach((button) => {
                if (button.dataset.keepEnabled !== 'true') button.disabled = isBusy;
            });
        }

        function isAdmin() {
            return state.currentUser?.role === 'admin';
        }

        function getNavItems() {
            if (isAdmin()) return NAV_ITEMS;
            return NAV_ITEMS.filter((item) => item.page !== 'leads');
        }

        function getDefaultPage() {
            return isAdmin() ? 'dashboard' : 'myLeads';
        }

        function canAccessPage(page) {
            return getNavItems().some((item) => item.page === page);
        }

        function showApp() {
            qs('#loginScreen').classList.add('hidden');
            qs('#appShell').classList.add('is-ready');
            qs('#userChip').textContent = `${state.currentUser.name || state.currentUser.username} - ${state.currentUser.role}`;
            if (!canAccessPage(state.page) || !isAdmin()) {
                state.page = getDefaultPage();
            }
            renderNav();
            routeTo(state.page);
        }

        function showLogin() {
            qs('#loginScreen').classList.remove('hidden');
            qs('#appShell').classList.remove('is-ready');
        }

        function renderNav() {
            const side = qs('[data-nav]');
            const tabs = qs('[data-tabs]');
            side.replaceChildren();
            tabs.replaceChildren();
            getNavItems().forEach((item) => {
                const sideBtn = document.createElement('button');
                sideBtn.className = `nav-btn ${item.page === state.page ? 'is-active' : ''}`;
                sideBtn.type = 'button';
                sideBtn.dataset.page = item.page;
                sideBtn.append(icon(item.icon), document.createTextNode(item.title));
                side.append(sideBtn);

                const tabBtn = document.createElement('button');
                tabBtn.className = `tab-btn ${item.page === state.page ? 'is-active' : ''}`;
                tabBtn.type = 'button';
                tabBtn.dataset.page = item.page;
                tabBtn.append(icon(item.icon), document.createTextNode(item.label));
                tabs.append(tabBtn);
            });
        }

        function routeTo(page) {
            const allowedItems = getNavItems();
            const item = allowedItems.find((entry) => entry.page === page) || allowedItems.find((entry) => entry.page === getDefaultPage()) || allowedItems[0];
            state.page = item.page;
            qs('#pageTitle').textContent = item.title;
            qs('#pageSubtitle').textContent = item.subtitle;
            renderNav();
            if (item.page === 'dashboard') renderDashboard();
            if (item.page === 'leads') renderLeads(state.leads, false);
            if (item.page === 'myLeads') renderLeads(filterMyLeads(state.leads), true);
            if (item.page === 'addLead') renderAddLead();
            if (item.page === 'followups') renderLeads(state.followups, false);
        }

        function renderDashboard() {
            const stats = state.stats || {};
            const content = qs('#pageContent');
            content.replaceChildren();
            const grid = el('section', 'grid stats-grid');
            [
                ['Total Leads', stats.total || 0],
                ['Conversion Rate', `${stats.conversionRate || 0}%`],
                ['Follow-ups', state.followups.length],
                ['Hot Leads', stats.byPriority?.Hot || 0]
            ].forEach(([label, value]) => {
                const card = el('div', 'card stat-card');
                card.append(el('span', '', label), el('strong', '', String(value)));
                grid.append(card);
            });
            const recent = el('section', 'grid');
            recent.append(sectionToolbar('Recent Leads', 'Latest visible records', false));
            recent.append(renderLeadList(state.leads.slice(0, 6)));
            content.append(grid, recent);
        }

        function sectionToolbar(title, subtitle, showActions = true) {
            const toolbar = el('div', 'card toolbar');
            const text = el('div');
            text.append(el('h3', '', title), el('p', 'subtle', subtitle));
            toolbar.append(text);
            if (showActions) {
                const add = button('Add Lead', 'plus', 'btn btn-primary');
                add.addEventListener('click', () => routeTo('addLead'));
                toolbar.append(add);
            }
            return toolbar;
        }

        function renderLeads(leads, isMine) {
            const content = qs('#pageContent');
            content.replaceChildren();
            const toolbar = el('div', 'card toolbar');
            const filters = el('div', 'filter-row');
            const status = selectInput('', [''].concat(state.options.statuses), 'All Status');
            const search = document.createElement('input');
            search.className = 'input';
            search.placeholder = 'Search name or phone';
            search.type = 'search';
            filters.append(status, search);
            const add = button('Add Lead', 'plus', 'btn btn-primary');
            add.addEventListener('click', () => routeTo('addLead'));
            toolbar.append(filters, add);
            content.append(toolbar, renderLeadList(leads));

            const apply = () => {
                const source = isMine ? filterMyLeads(state.leads) : state.leads;
                const term = search.value.trim().toLowerCase();
                const filtered = source.filter((lead) => {
                    const matchesStatus = !status.value || lead.Status === status.value;
                    const matchesTerm = !term || [lead.Name, lead.Phone, lead['Assigned To']].some((value) => String(value || '').toLowerCase().includes(term));
                    return matchesStatus && matchesTerm;
                });
                content.lastElementChild.replaceWith(renderLeadList(filtered));
            };
            status.addEventListener('change', apply);
            search.addEventListener('input', debounce(apply, 160));
        }

        function filterMyLeads(leads) {
            if (state.currentUser?.role === 'admin') return leads;
            return leads.filter((lead) => String(lead['Assigned To'] || '') === String(state.currentUser?.username || ''));
        }

        function renderLeadList(leads) {
            const wrap = el('section', 'lead-list');
            if (!leads.length) {
                wrap.append(el('div', 'card empty-state', 'No leads found.'));
                return wrap;
            }
            leads.forEach((lead) => wrap.append(renderLeadCard(lead)));
            return wrap;
        }

        function renderLeadCard(lead) {
            const phone = formatPhoneNumber(lead.Phone) || String(lead.Phone || '');
            const card = el('article', 'card lead-card');
            const head = el('div', 'lead-head');
            const title = el('div');
            title.append(el('div', 'lead-name', String(lead.Name || 'Unnamed Lead')));
            const meta = el('div', 'lead-meta');
            meta.append(el('span', '', phone || 'No phone'));
            meta.append(el('span', '', `Assigned: ${lead['Assigned To'] || 'Unassigned'}`));
            meta.append(el('span', '', `Next: ${formatDate(lead['Next Follow-up Date'])}`));
            title.append(meta);
            const badges = el('div', 'lead-meta');
            badges.append(badge(lead.Status || 'New', statusClass(lead.Status)));
            badges.append(badge(lead.Priority || 'Cold', priorityClass(lead.Priority)));
            if (isOverdue(lead['Next Follow-up Date'])) badges.append(badge('Overdue', 'badge-overdue'));
            head.append(title, badges);

            const remarks = lead.Remarks ? el('p', 'subtle', String(lead.Remarks)) : null;
            const actions = el('div', 'lead-actions');
            actions.append(
                iconButton('Call', 'phone', () => callPhone(phone)),
                iconButton('WhatsApp', 'message', () => openWhatsApp(phone)),
                iconButton('Edit', 'edit', () => openLeadModal(lead)),
                iconButton('Delete', 'trash', () => deleteLead(lead['Lead ID']))
            );
            card.append(head);
            if (remarks) card.append(remarks);
            card.append(actions);
            return card;
        }

        function badge(text, cls) {
            return el('span', `badge ${cls || ''}`, text);
        }

        function priorityClass(priority) {
            const value = String(priority || '').toLowerCase();
            if (value === 'hot') return 'badge-hot';
            if (value === 'warm') return 'badge-warm';
            return 'badge-cold';
        }

        function statusClass(status) {
            return String(status || '').toLowerCase() === 'closed' ? 'badge-ok' : '';
        }

        function renderAddLead() {
            const content = qs('#pageContent');
            content.replaceChildren();
            const card = el('section', 'card form-card');
            const form = qs('#leadForm').cloneNode(true);
            form.id = 'newLeadForm';
            card.append(form);
            content.append(card);
            fillLeadFormOptions(form);
            form.addEventListener('submit', (event) => submitLeadForm(event, form));
        }

        function fillLeadFormOptions(root = document) {
            setSelectOptions(qs('#leadSource', root), state.options.sources);
            setSelectOptions(qs('#leadStatus', root), state.options.statuses);
            setSelectOptions(qs('#leadPriority', root), state.options.priorities);
            setSelectOptions(qs('#leadAssignedTo', root), state.options.users);
        }

        function setSelectOptions(select, values) {
            if (!select) return;
            const current = select.value;
            select.replaceChildren();
            values.forEach((value) => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                select.append(option);
            });
            if (values.includes(current)) select.value = current;
        }

        function openLeadModal(lead) {
            qs('#modalTitle').textContent = 'Edit Lead';
            qs('#leadId').value = lead['Lead ID'] || '';
            qs('#leadName').value = lead.Name || '';
            qs('#leadPhone').value = formatPhoneNumber(lead.Phone) || '';
            qs('#leadSource').value = lead.Source || state.options.sources[0];
            qs('#leadStatus').value = lead.Status || state.options.statuses[0];
            qs('#leadPriority').value = lead.Priority || state.options.priorities[0];
            qs('#leadAssignedTo').value = lead['Assigned To'] || state.options.users[0];
            qs('#leadNextFollowup').value = isoDateOnly(lead['Next Follow-up Date']);
            qs('#leadRemarks').value = lead.Remarks || '';
            qs('#leadModal').classList.add('is-open');
        }

        function closeModal() {
            qs('#leadModal').classList.remove('is-open');
            qs('#leadForm').reset();
        }

        function isoDateOnly(value) {
            if (!value) return '';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '' : date.toISOString().slice(0, 10);
        }

        async function submitLeadForm(event, form = qs('#leadForm')) {
            event.preventDefault();
            const phone = formatPhoneNumber(qs('#leadPhone', form).value);
            if (!phone) {
                showToast('Enter a valid 10 digit phone number.', 'error');
                return;
            }
            const leadId = qs('#leadId', form)?.value || '';
            const payload = {
                leadId,
                name: qs('#leadName', form).value.trim(),
                phone,
                source: qs('#leadSource', form).value,
                status: qs('#leadStatus', form).value,
                priority: qs('#leadPriority', form).value,
                assignedTo: qs('#leadAssignedTo', form).value,
                nextFollowupDate: qs('#leadNextFollowup', form).value,
                remarks: qs('#leadRemarks', form).value.trim()
            };
            try {
                setBusy(true);
                await api(leadId ? 'updateLead' : 'addLead', { lead: payload });
                showToast(leadId ? 'Lead updated.' : 'Lead added.');
                await refreshData(false);
                closeModal();
                routeTo(isAdmin() ? 'leads' : 'myLeads');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setBusy(false);
            }
        }

        async function deleteLead(leadId) {
            if (!leadId || !confirm('Delete this lead?')) return;
            try {
                setBusy(true);
                await api('deleteLead', { leadId });
                showToast('Lead deleted.');
                await refreshData(false);
                routeTo(state.page);
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setBusy(false);
            }
        }

        function callPhone(phone) {
            const formatted = formatPhoneNumber(phone);
            if (!formatted) return showToast('Invalid phone number.', 'error');
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                window.location.href = `tel:+91${formatted}`;
                return;
            }
            navigator.clipboard?.writeText(`+91${formatted}`);
            showToast('Phone number copied.');
        }

        function openWhatsApp(phone) {
            const formatted = formatPhoneNumber(phone);
            if (!formatted) return showToast('Invalid phone number.', 'error');
            window.open(`https://wa.me/91${formatted}`, '_blank', 'noopener,noreferrer');
        }

        async function refreshData(notify = true) {
            await bootstrapData();
            routeTo(state.page);
            if (notify) showToast('CRM refreshed.');
        }

        function logout(notify = true) {
            clearSession();
            showLogin();
            if (notify) showToast('Logged out.');
        }

        function el(tag, className = '', text = '') {
            const node = document.createElement(tag);
            if (className) node.className = className;
            if (text !== '') node.textContent = text;
            return node;
        }

        function button(label, iconName, className = 'btn') {
            const btn = document.createElement('button');
            btn.className = className;
            btn.type = 'button';
            btn.append(icon(iconName), document.createTextNode(label));
            return btn;
        }

        function iconButton(label, iconName, handler) {
            const btn = document.createElement('button');
            const actionClass = `action-${label.toLowerCase().replace(/[^a-z0-9]+/g, '-')}`;
            btn.className = `icon-btn ${actionClass}`;
            btn.type = 'button';
            btn.setAttribute('aria-label', label);
            btn.title = label;
            btn.append(icon(iconName), el('span', 'icon-label', label));
            btn.addEventListener('click', handler);
            return btn;
        }

        function selectInput(value, values, placeholder) {
            const select = document.createElement('select');
            select.className = 'select';
            values.forEach((item) => {
                const option = document.createElement('option');
                option.value = item;
                option.textContent = item || placeholder || 'All';
                select.append(option);
            });
            select.value = value;
            return select;
        }

        function debounce(fn, wait) {
            let timeout = 0;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn(...args), wait);
            };
        }

        document.addEventListener('click', (event) => {
            const navButton = event.target.closest('[data-page]');
            if (navButton) routeTo(navButton.dataset.page);
        });

        qs('#loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!state.apiUrl) {
                showToast('Configure the API URL before logging in.', 'error');
                return;
            }
            try {
                setBusy(true);
                await login(qs('#username').value.trim(), qs('#password').value);
                await bootstrapData();
                showApp();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setBusy(false);
            }
        });

        qs('#leadForm').addEventListener('submit', submitLeadForm);
        qs('#closeModalBtn').addEventListener('click', closeModal);
        qs('#leadModal').addEventListener('click', (event) => {
            if (event.target.id === 'leadModal') closeModal();
        });
        qs('#logoutBtn').addEventListener('click', () => logout(true));
        qs('#mobileLogoutBtn').addEventListener('click', () => logout(true));
        qs('#refreshBtn').addEventListener('click', () => refreshData(true).catch((error) => showToast(error.message, 'error')));

        readConfig();
        mountIcons();
        fillLeadFormOptions();
        if (loadSession()) {
            bootstrapData()
                .then(showApp)
                .catch((error) => {
                    clearSession();
                    showLogin();
                    showToast(error.message, 'error');
                });
        }
    </script>
</body>
</html>
