<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#047857">
  <title>Jajabor AI CRM Offline</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f7faf9;
      color: #101828;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 420px);
      border: 1px solid #d3dce5;
      border-radius: 8px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(16, 24, 40, .12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 18px;
      color: #536579;
      line-height: 1.5;
    }

    a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #047857;
      color: #fff;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Offline</h1>
    <p>The CRM shell is installed, but live leads need an internet connection to sync with Google Apps Script.</p>
    <a href="./">Try Again</a>
  </main>
</body>
</html>
